{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center mt-3">
    <div class="col-md-8 col-lg-6">
        <div class="card p-4 shadow-lg" style="border-top: 4px solid #d00000;">
            <h3 class="text-center mb-4 text-white fw-bold">НАСТРОЙКИ ПРОФИЛЯ</h3>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <div class="text-start">
                    {{ form|crispy }}
                </div>

                <button type="submit" class="btn btn-danger btn-lg w-100 mt-4 fw-bold text-uppercase py-3">Сохранить изменения</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
