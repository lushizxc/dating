{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8 col-lg-6"> <div class="card p-4 shadow-lg" style="background-color: #1e1e1e; border: 1px solid #333;">
            <h3 class="text-center mb-4 text-danger fw-bold">Твой профиль</h3>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                {{ form|crispy }}
                <button type="submit" class="btn btn-danger btn-lg w-100 mt-4 fw-bold">Принять изменения</button>
            </form>

        </div>
    </div>
</div>
{% endblock %}
