<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phantom Инцелы Dating</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .navbar { background-color: #d00000 !important; }
        .card { background-color: #1e1e1e; border: 1px solid #333; color: white; }
        .btn-success { background-color: #28a745; border: none; }
        .btn-danger { background-color: #d00000; border: none; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'accounts:home' %}">Phantom Инцелы Dating</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'accounts:home' %}">Лента</a>
                <a class="nav-link" href="/matches/">Мэтчи</a>
               <form method="post" action="{% url 'accounts:logout' %}" style="display:inline;">
    {% csrf_token %}
    <button type="submit" class="btn btn-link nav-link shadow-none"
            style="display:inline; cursor:pointer; text-decoration:none;">
        Выход
    </button>
</form>
                <a class="nav-link" href="{% url 'accounts:update' %}">{{user.username}}</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
