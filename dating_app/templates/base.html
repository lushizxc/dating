<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Tinder Clone</title>
</head>
<body>

    <nav>
        {% if user.is_authenticated %}
            <a href="{% url 'accounts:update' %}">Привет, {{ user.username }}! </a>

            <form method="post" action="{% url 'accounts:logout' %}" style="display: inline;">
    {% csrf_token %}
    <button type="submit" style="background: none; border: none; color: blue; text-decoration: underline; cursor: pointer; padding: 0;">
        Выйти
    </button>
</form>
        <a href="{% url 'accounts:matches' %}">Мои пары</a>

        {% else %}
            <a href="{% url 'accounts:login' %}">Войти</a>

            <a href="{% url 'accounts:registration' %}">Регистрация</a>
        {% endif %}
        </nav>

    <hr>

    <main>
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
